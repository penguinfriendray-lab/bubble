<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>快速排序法視覺化</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin-top: 50px;
        }
        h1 { color: #333; }
        #container {
            display: flex;
            align-items: flex-end;
            height: 300px;
            gap: 5px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: min(1000px, 100%);
        }
        .bar {
            width: 30px;
            background-color: #3498db;
            transition: 0.2s all ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            color: white;
            font-size: 12px;
            padding-bottom: 5px;
            border-radius: 3px 3px 0 0;
        }
        .controls { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:disabled { background-color: #bdc3c7; }
        .comparing { background-color: #e74c3c !important; }
        .pivot { background-color: #f39c12 !important; }
        .sorted { background-color: #9b59b6 !important; }
        .nav { margin-top: 20px; }
        .nav a { margin: 0 10px; color: #2d6cdf; text-decoration: none; }
    </style>
</head>
<body>
    <h1>快速排序法 (Quick Sort) 視覺化</h1>
    <div id="container"></div>
    <div class="controls">
        <button onclick="startSort()" id="startBtn">開始排序</button>
        <button onclick="resetArray()">重置數組</button>
    </div>
    <div class="nav">
        <a href="./index.html">回首頁</a>
        <a href="./README.md">開啟報告</a>
    </div>
    <script>
        const container = document.getElementById('container');
        let array = [];
        const ARRAY_SIZE = 15;

        function resetArray() {
            container.innerHTML = '';
            array = [];
            for (let i = 0; i < ARRAY_SIZE; i++) {
                const val = Math.floor(Math.random() * 90) + 10;
                array.push(val);
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${val * 2.5}px`;
                bar.innerText = val;
                bar.id = `bar-${i}`;
                container.appendChild(bar);
            }
            document.getElementById('startBtn').disabled = false;
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function swapBars(i, j) {
            [array[i], array[j]] = [array[j], array[i]];
            const barA = document.getElementById(`bar-${i}`);
            const barB = document.getElementById(`bar-${j}`);
            const heightA = barA.style.height;
            const heightB = barB.style.height;
            const textA = barA.innerText;
            const textB = barB.innerText;
            barA.style.height = heightB;
            barB.style.height = heightA;
            barA.innerText = textB;
            barB.innerText = textA;
        }

        async function partition(low, high) {
            const bars = document.getElementsByClassName('bar');
            const pivot = array[high];
            bars[high].classList.add('pivot');
            let i = low - 1;
            for (let j = low; j < high; j++) {
                bars[j].classList.add('comparing');
                await sleep(180);
                if (array[j] < pivot) {
                    i++;
                    await swapBars(i, j);
                }
                bars[j].classList.remove('comparing');
            }
            await swapBars(i + 1, high);
            bars[high].classList.remove('pivot');
            return i + 1;
        }

        async function quickSort(low, high) {
            if (low < high) {
                const pi = await partition(low, high);
                await quickSort(low, pi - 1);
                await quickSort(pi + 1, high);
            }
        }

        async function startSort() {
            document.getElementById('startBtn').disabled = true;
            await quickSort(0, array.length - 1);
            const bars = document.getElementsByClassName('bar');
            for (let i = 0; i < bars.length; i++) {
                bars[i].classList.add('sorted');
            }
        }

        resetArray();
    </script>
</body>
</html>
